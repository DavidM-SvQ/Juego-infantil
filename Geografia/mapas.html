<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visor de Mapas 🗺️</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <link rel="stylesheet" href="../style.css">
    <style>
        body { background: #e8eaf6 !important; margin: 0; font-family: 'Quicksand', sans-serif; text-align: center; }
        .header-juego { background: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #3f51b5; }
        .btn-volver { background: #546e7a; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }

        .contenedor-mapas {
            max-width: 1100px; margin: 20px auto; background: white;
            border-radius: 40px; padding: 25px; border: 8px solid #3f51b5;
            box-shadow: 0 15px 0 #c5cae9; position: relative;
        }

        .visor-contenedor { position: relative; width: 100%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; }

        .visor-mapa {
            width: 100%; height: 550px; background: #fdfdfd; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 4px solid #eee;
        }

        .visor-mapa img { max-width: 98%; max-height: 98%; object-fit: contain; transition: opacity 0.4s; }
        
        /* FLECHAS REFORZADAS */
        .flecha {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 80px; height: 80px; background: #3f51b5; color: white;
            border: 4px solid white; border-radius: 50%; font-size: 3rem;
            cursor: pointer; z-index: 999; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }
        .flecha:hover { background: #1a237e; scale: 1.1; }
        .flecha-izq { left: 10px; }
        .flecha-der { right: 10px; }

        .controles-mapa { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 15px; }
        .btn-mapa { padding: 12px 20px; font-size: 1.1rem; font-weight: bold; border-radius: 20px; border: none; cursor: pointer; color: white; background: #3f51b5; }
        .btn-mapa.activo { background: #1a237e; outline: 4px solid #ffeb3b; }
        .info-mapa { font-size: 1.6rem; color: #3f51b5; font-weight: bold; margin: 10px 0; }
    </style>
</head>

<body class="isla-tema bg-geografia">
    <div class="header-juego">
        <a href="geografia-mapas.html" class="btn btn-volver">⬅ OTROS MAPAS</a>
        <h1 id="titulo-zona" style="margin: 0; color: #1a237e; font-size: 2.2rem;">Cargando...</h1>
    </div>

    <div class="contenedor-mapas">
        <div class="visor-contenedor">
            <button class="flecha flecha-izq" onclick="navegar(-1)">⬅</button>
            <div id="visor" class="visor-mapa">
                <img id="imagen-mapa" src="" alt="Mapa">
            </div>
            <button class="flecha flecha-der" onclick="navegar(1)">➡</button>
        </div>
        <div id="descripcion" class="info-mapa">Cargando...</div>
        <div id="area-botones" class="controles-mapa"></div>
    </div>

    <script>
        const zonasGeo = {
            "espana": {
                titulo: "🇪🇸 España",
                mapas: [
                    { id: "com", btn: "Comunidades", url: "Mapa-España-político-CCAA.jpg", txt: "Comunidades Autónomas de España", voz: "Comunidades autónomas." },
                    { id: "pro", btn: "Provincias", url: "Mapa-España-político-provincias.jpg", txt: "Provincias de España", voz: "Provincias." },
                    { id: "fis", btn: "Físico", url: "Mapa-España-físico.jpg", txt: "Ríos y Montañas de España", voz: "Mapa físico." }
                ]
            },
            "andalucia": {
                titulo: "🟢 Andalucía",
                mapas: [
                    { id: "and-p", btn: "Provincias", url: "Mapa-Andalucía-Provincias.png", txt: "Las 8 provincias de Andalucía", voz: "Provincias de Andalucía." },
                    { id: "and-f", btn: "Físico", url: "Mapa-Andalucía-Físico.jpg", txt: "Relieve de Andalucía", voz: "Mapa físico de Andalucía." }
                ]
            },
            "mundo": {
                titulo: "🌎 El Mundo",
                mapas: [
                    { id: "m-cont", btn: "Continentes", url: "mundo.jpg", txt: "Continentes del Mundo", voz: "Los continentes." }
                ]
            },
            "europa": {
                titulo: "🇪🇺 Europa",
                mapas: [
                    { id: "e-pais", btn: "Países", url: "europa.jpg", txt: "Países de Europa", voz: "Mapa de Europa." }
                ]
            }
        };

        let listaMapasActuales = [];
        let indiceActual = 0;

        function hablar(t) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'es-ES'; window.speechSynthesis.speak(m);
        }

        function cambiarMapa(index) {
            indiceActual = index;
            const mapaData = listaMapasActuales[indiceActual];
            
            document.querySelectorAll('.btn-mapa').forEach((b, i) => {
                if(i === indiceActual) b.classList.add('activo');
                else b.classList.remove('activo');
            });

            const img = document.getElementById('imagen-mapa');
            img.style.opacity = 0;
            
            setTimeout(() => {
                img.src = mapaData.url;
                img.onload = () => {
                    img.style.opacity = 1;
                    document.getElementById('descripcion').innerText = mapaData.txt;
                    hablar(mapaData.voz);
                };
            }, 300);
        }

        function navegar(dir) {
            indiceActual += dir;
            if (indiceActual < 0) indiceActual = listaMapasActuales.length - 1;
            if (indiceActual >= listaMapasActuales.length) indiceActual = 0;
            cambiarMapa(indiceActual);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const zonaID = params.get('zona') || "espana";
            const datosZona = zonasGeo[zonaID];
            
            listaMapasActuales = datosZona.mapas;
            document.getElementById('titulo-zona').innerText = datosZona.titulo;

            const areaBotones = document.getElementById('area-botones');
            listaMapasActuales.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = `btn-mapa`;
                btn.innerText = m.btn;
                btn.onclick = () => cambiarMapa(i);
                areaBotones.appendChild(btn);
            });

            // Si solo hay un mapa, ocultar flechas
            if(listaMapasActuales.length <= 1) {
                document.querySelectorAll('.flecha').forEach(f => f.style.visibility = 'hidden');
            }

            cambiarMapa(0);
        };
    </script>
</body>
</html>
