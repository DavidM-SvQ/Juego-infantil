<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seleccionar Mapa 🗺️</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <link rel="stylesheet" href="../style.css">
    <style>
        body { margin: 0; font-family: 'Quicksand', sans-serif; background: #e8eaf6 !important; text-align: center; }
        .header-juego { background: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #3f51b5; }
        .btn-volver { background: #546e7a; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }
        .grid-mapas { display: flex; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px 20px; max-width: 1100px; margin: 0 auto; }
        .card-mapa { background: white; border-radius: 35px; padding: 20px; width: 200px; height: 180px; text-decoration: none; color: #1a237e; border: 6px solid #3f51b5; box-shadow: 0 10px 0 #c5cae9; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-mapa:hover { transform: translateY(-8px); box-shadow: 0 18px 0 #c5cae9; }
        .card-mapa span { font-size: 3.5rem; display: block; margin-bottom: 10px; }
        .card-mapa h2 { margin: 0; font-size: 1.4rem; }
        .card-mundo { border-color: #4CAF50; box-shadow: 0 10px 0 #A5D6A7; }
        .card-europa { border-color: #2196F3; box-shadow: 0 10px 0 #90CAF9; }
        .card-espana { border-color: #F44336; box-shadow: 0 10px 0 #EF9A9A; }
        .card-andalucia { border-color: #4CAF50; box-shadow: 0 10px 0 #A5D6A7; }
        h1 { color: #1a237e; font-size: 2.2rem; margin: 0; }
        h2.pregunta { font-size: 2.5rem; color: #3f51b5; margin-top: 40px; width: 100%; }
    </style>
</head>

<body class="isla-tema bg-geografia">
    <div class="header-juego">
        <a href="geografia-menu.html" class="btn btn-volver">⬅ MENÚ GEOGRAFÍA</a>
        <h1>🗺️ Mapas del Mundo</h1>
    </div>
    <h2 class="pregunta">¿A qué lugar vamos a viajar?</h2>
    <div class="grid-mapas">
        <a href="mapas.html?zona=mundo" class="card-mapa card-mundo"><span>🌎</span><h2>El Mundo</h2></a>
        <a href="mapas.html?zona=europa" class="card-mapa card-europa"><span>🇪🇺</span><h2>Europa</h2></a>
        <a href="mapas.html?zona=espana" class="card-mapa card-espana"><span>🇪🇸</span><h2>España</h2></a>
        <a href="mapas.html?zona=andalucia" class="card-mapa card-andalucia"><span>🟢</span><h2>Andalucía</h2></a>
    </div>
</body>
</html>
