<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Isla de Geografía 🌍</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <link rel="stylesheet" href="../style.css">
    <style>
        body { margin: 0; font-family: 'Quicksand', sans-serif; background: #e8eaf6 !important; text-align: center; }
        
        .header-juego { background: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #3f51b5; }
        .btn-volver { background: #546e7a; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; }

        .menu-geografia { 
            display: flex; 
            flex-direction: row; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 30px; 
            padding: 50px 20px; 
            max-width: 900px; 
            margin: 0 auto; 
        }

        /* TARJETAS HORIZONTALES COMPACTAS */
        .card-inicio {
            background: white;
            border-radius: 40px;
            padding: 30px;
            width: 250px;
            height: 220px;
            text-decoration: none;
            color: #1a237e;
            border: 8px solid #3f51b5;
            box-shadow: 0 12px 0 #c5cae9;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card-inicio:hover { transform: translateY(-10px); box-shadow: 0 22px 0 #c5cae9; }
        
        /* ICONOS MODERADOS */
        .card-inicio span { 
            font-size: 4.5rem; 
            display: block; 
            margin-bottom: 15px; 
        }

        .card-inicio h2 { margin: 0; font-size: 1.8rem; }
        
        /* Color para Banderas */
        .card-banderas { border-color: #ff9800; color: #e65100; box-shadow: 0 12px 0 #ffe0b2; }
        .card-banderas:hover { box-shadow: 0 22px 0 #ffe0b2; }

        h1 { color: #1a237e; font-size: 2.5rem; margin: 0; }
        h2.pregunta { font-size: 2.2rem; color: #3f51b5; margin-top: 40px; width: 100%; }
    </style>
</head>

<body class="isla-tema bg-geografia">
    <div class="header-juego">
        <a href="../index.html" class="btn btn-volver">⬅ MAPA PRINCIPAL</a>
        <h1>🌍 Isla de Geografía</h1>
    </div>

    <h2 class="pregunta">¿Qué quieres explorar hoy?</h2>

    <div class="menu-geografia">
        
        <!-- ENLACE A MAPAS -->
        <a href="geografia-mapas.html" class="card-inicio">
            <span>🗺️</span>
            <h2>Mapas</h2>
        </a>

        <!-- ENLACE A BANDERAS -->
        <a href="geografia-banderas.html" class="card-inicio card-banderas">
            <span>🚩</span>
            <h2>Banderas</h2>
        </a>

    </div>

    <script>
        window.onload = () => {
            const m = new SpeechSynthesisUtterance("¡Bienvenida a Geografía! ¿Quieres ver mapas o jugar con banderas?");
            m.lang = 'es-ES'; window.speechSynthesis.speak(m);
        };
    </script>
</body>
</html>
