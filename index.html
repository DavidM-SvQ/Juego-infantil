<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Mapa de Aventuras 🏝️</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* IMPORTACIÓN DE FUENTE MODERNA */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');

        body { 
            margin: 0; 
            font-family: 'Fredoka', sans-serif; 
            background-color: #b3e5fc; /* Fondo azul base */
            color: #333;
            overflow-x: hidden;
        }

        /* TU IMAGEN DE FONDO PERSONALIZADA */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Ruta actualizada a tu carpeta de recursos */
            background-image: url('Recursos/Imagenes/Fondo_index.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0.20; /* Ajustado para que se vea un poco más pero sin molestar */
            z-index: -1;
        }

        /* CABECERA ESTILO "GLASS" (CRISTAL) */
        #cabecera-perfil { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); 
            padding: 15px 30px; 
            display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        
        .perfil-info { display: flex; align-items: center; gap: 15px; }
        #avatar-mini { font-size: 3rem; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
        #nombre-perfil { font-size: 1.8rem; font-weight: 600; color: #00796b; text-shadow: 1px 1px white; }
        
        .cofre-estrellas { 
            background: linear-gradient(135deg, #ffca28, #ff8f00); 
            padding: 10px 25px; border-radius: 50px; 
            border: 4px solid white; display: flex; align-items: center; gap: 10px;
            font-size: 1.6rem; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 8px 20px rgba(255, 143, 0, 0.4);
        }

        /* GRID DE ISLAS MODERNAS */
        #mapa { display: none; padding: 30px 20px; }
        
        .islas-grid { 
            display: flex; flex-direction: row; flex-wrap: wrap; 
            justify-content: center; gap: 30px; margin-top: 20px; 
        }
        
        .isla { 
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(8px); 
            border-radius: 50px; 
            padding: 25px; 
            width: 190px; height: 210px;
            text-decoration: none; color: #1a237e; 
            border: 4px solid rgba(255,255,255,0.7);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .isla:hover { 
            transform: translateY(-15px) scale(1.05); 
            background: rgba(255, 255, 255, 0.85);
            border-color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); 
        }

        /* ANIMACIÓN DE ICONOS FLOTANTES */
        @keyframes flotar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        .isla span { 
            font-size: 4.5rem; margin-bottom: 8px; 
            animation: flotar 3s ease-in-out infinite;
            display: inline-block;
        }
        .isla:nth-child(even) span { animation-delay: 0.5s; }

        .isla h2 { margin: 0; font-size: 1.5rem; font-weight: 600; }

        /* REGISTRO ESTILO CAJA MÁGICA */
        #pantalla-registro { padding: 60px 20px; display: none; justify-content: center; }
        .caja-registro {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 60px;
            border: 8px solid #00bcd4;
            box-shadow: 0 20px 0 rgba(0,188,212,0.2);
            max-width: 500px; width: 90%;
        }

        .avatar-opcion { 
            font-size: 3.5rem; cursor: pointer; padding: 15px; 
            border: 5px solid #eee; border-radius: 35px; transition: 0.3s; 
            background: white; display: inline-block; margin: 8px;
            box-shadow: 0 5px 0 #eee;
        }
        .avatar-opcion.selected { 
            border-color: #ff4081; background: #f8bbd0; 
            transform: scale(1.1) rotate(-5deg); box-shadow: 0 8px 0 #f06292;
        }

        .btn-principal {
            background: #ff4081; color: white; padding: 20px 50px; 
            border-radius: 50px; border: none; font-size: 1.8rem; 
            cursor: pointer; box-shadow: 0 10px 0 #c2185b; 
            margin-top: 30px; font-weight: bold; transition: 0.2s;
        }
        .btn-principal:active { transform: translateY(5px); box-shadow: 0 4px 0 #c2185b; }

        .btn-reset { margin-top: 60px; background: rgba(0,0,0,0.05); border: none; padding: 10px 20px; border-radius: 20px; color: #546e7a; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <!-- REGISTRO -->
    <div id="pantalla-registro">
        <div class="caja-registro">
            <h1 style="color: #00796b; margin-top:0;">¡Nueva Aventura! 😊</h1>
            <p style="font-size: 1.3rem;">¿Cómo te llamas, capitana?</p>
            <input type="text" id="nombre-input" placeholder="Tu nombre..." autocomplete="off" style="padding:15px; border-radius:20px; border:4px solid #00bcd4; font-size:1.5rem; text-align:center; width: 80%;">
            
            <p style="margin-top:30px; font-size: 1.3rem;">Elige tu personaje:</p>
            <div class="avatar-selector">
                <div class="avatar-opcion" onclick="selectAvatar('👧', this)">👧</div>
                <div class="avatar-opcion" onclick="selectAvatar('👩‍🦰', this)">👩‍🦰</div>
                <div class="avatar-opcion" onclick="selectAvatar('👸', this)">👸</div>
                <div class="avatar-opcion" onclick="selectAvatar('🧚‍♀️', this)">🧚‍♀️</div>
                <div class="avatar-opcion" onclick="selectAvatar('🐱', this)">🐱</div>
                <div class="avatar-opcion" onclick="selectAvatar('🦄', this)">🦄</div>
            </div>
            
            <button class="btn-principal" onclick="crearPerfil()">¡VAMOS! 🚀</button>
        </div>
    </div>

    <!-- MAPA -->
    <div id="mapa">
        <div id="cabecera-perfil">
            <div class="perfil-info">
                <div id="avatar-mini"></div>
                <div id="nombre-perfil"></div>
            </div>
            
            <div style="display:flex; gap:15px; align-items:center;">
                <a href="diploma.html" id="btn-diploma" style="display:none; text-decoration:none; padding:10px; border-radius:15px; font-size:1.8rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">🎓</a>
                <a href="tienda.html" style="background:white; text-decoration:none; padding:10px; border-radius:15px; font-size:1.8rem; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">🛒</a>
                
                <div class="cofre-estrellas">
                    <span>⭐</span>
                    <span id="estrellas-totales">0</span>
                </div>
            </div>
        </div>

        <div class="islas-grid">
            <a href="Calendario/calendario.html" class="isla"><span>📅</span><h2>Calendario</h2></a>
            <a href="Matematicas/mates.html" class="isla"><span>🔢</span><h2>Mates</h2></a>
            <a href="Lengua/letras.html" class="isla"><span>🔤</span><h2>Letras</h2></a>
            <a href="Ciencias/ciencias.html" class="isla"><span>🧪</span><h2>Ciencias</h2></a>
            <a href="Ingles/english.html" class="isla"><span>🇬🇧</span><h2>English</h2></a>
            <a href="geografia/geografia-menu.html" class="isla"><span>🌍</span><h2>Geografía</h2></a>
            <a href="Musica/musica-menu.html" class="isla"><span>🎵</span><h2>Música</h2></a>
        </div>
        
        <button class="btn-reset" onclick="borrarTodo()">Reiniciar perfil</button>
    </div>

    <script>
        let avatarElegido = "";

        function selectAvatar(emoji, el) {
            document.querySelectorAll('.avatar-opcion').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            avatarElegido = emoji;
        }

        function crearPerfil() {
            const nombre = document.getElementById('nombre-input').value;
            if (nombre.trim() === "" || avatarElegido === "") {
                alert("Escribe tu nombre y elige un personaje.");
                return;
            }
            localStorage.setItem('user_nombre', nombre);
            localStorage.setItem('user_avatar', avatarElegido);
            localStorage.setItem('user_estrellas', 0);
            cargarApp();
        }

        function cargarApp() {
            const nombre = localStorage.getItem('user_nombre');
            const avatar = localStorage.getItem('user_avatar');
            const estrellas = parseInt(localStorage.getItem('user_estrellas')) || 0;

            if (nombre) {
                document.getElementById('pantalla-registro').style.display = 'none';
                document.getElementById('mapa').style.display = 'block';
                document.getElementById('nombre-perfil').innerText = "Capitana " + nombre;
                document.getElementById('avatar-mini').innerText = avatar;
                document.getElementById('estrellas-totales').innerText = estrellas;

                const btnDip = document.getElementById('btn-diploma');
                if (estrellas >= 100) {
                    btnDip.style.display = 'block';
                    if (estrellas >= 1000) btnDip.style.background = "#ffd700";
                    else if (estrellas >= 500) btnDip.style.background = "#e0e0e0";
                    else btnDip.style.background = "#cd7f32";
                }
            } else {
                document.getElementById('pantalla-registro').style.display = 'flex';
            }
        }

        function borrarTodo() {
            if(confirm("¿Seguro que quieres borrar tu perfil?")) {
                localStorage.clear(); location.reload();
            }
        }

        window.onload = cargarApp;
    </script>
</body>
</html>
