<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Land 🇬🇧</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <link rel="stylesheet" href="../style.css">
    <script src="../diccionario.js"></script>
    <script src="../progreso.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        
        :root { 
            --en-blue: #2196F3; 
            --en-pink: #e91e63; 
            --en-light-blue: #bbdefb;
        }
        
        body { 
            margin: 0; font-family: 'Fredoka', sans-serif; text-align: center; color: #333; 
            background: #e3f2fd url('../Recursos/Imagenes/fondo_ingles.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: -1; }

        /* CABECERA: VOLVER (Izquierda) | ESTRELLAS (Centro) | TÍTULO (Derecha) */
        .header-juego { 
            background: white; 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 6px solid var(--en-blue); 
        }
        
        .header-juego h1 { color: #1565c0; margin: 0; font-size: 2rem; }

        /* Estrellas simples con el color azul de English Land */
        .contador-estrellas-simple { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: var(--en-blue); 
            margin: 0;
        }

        .btn-volver { background: #546e7a; color: white !important; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0 #37474f; }
        
        /* CONTENEDOR */
        .contenedor-blanco { 
            max-width: 1000px; 
            margin: 20px auto; 
            background: white; 
            border-radius: 50px; 
            padding: 30px; 
            border: 8px solid var(--en-blue); 
            min-height: 650px; 
            position: relative; 
            box-shadow: 0 15px 0 var(--en-light-blue); 
        }

        .instruccion { font-size: 2.2rem; color: var(--en-blue); margin-bottom: 10px; font-weight: bold; }
        
        /* VISOR DE IMAGEN */
        .visor-en {
            width: 180px; height: 160px; margin: 0 auto;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .img-en { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; }
        .emoji-en-bg { position: absolute; font-size: 6rem; z-index: 1; transition: opacity 0.3s; }

        /* MECÁNICAS */
        .opciones-grid { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .card-en { width: 200px; background: #fff; border: 4px solid #eee; border-radius: 30px; padding: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0 #eee; }
        .card-en:hover { transform: translateY(-5px); border-color: var(--en-blue); background: #f3e5f5; }
        
        .orden-wrap { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; max-width: 900px; margin: 0 auto; }
        .box-item { padding: 15px 20px; background: white; border: 3px solid var(--en-pink); border-radius: 15px; cursor: pointer; font-size: 1.5rem; font-weight: bold; transition: 0.2s; box-shadow: 0 5px 0 #ad1457; }
        .box-item.done { background: #c8e6c9; border-color: #4caf50; pointer-events: none; transform: scale(0.9); opacity: 0.7; box-shadow: none; }
        
        .palabra-guia { font-size: 3.5rem; color: #1e88e5; font-weight: bold; letter-spacing: 5px; margin: 10px 0; background: #e3f2fd; display: inline-block; padding: 5px 20px; border-radius: 20px; }
        .sopa-letras { display: grid; grid-template-columns: repeat(6, 65px); gap: 8px; justify-content: center; margin-top: 15px; }
        .letra-en { width: 65px; height: 65px; border: 3px solid #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; cursor: pointer; background: white; box-shadow: 0 4px 0 #ddd; }
        .letra-en.active { background: #ffeb3b; border-color: #fbc02d; box-shadow: none; transform: translateY(4px); }
        
        .btn-audio { background: var(--en-pink); color: white; padding: 12px 30px; border-radius: 50px; border: none; font-size: 1.5rem; cursor: pointer; box-shadow: 0 6px 0 #880e4f; margin-bottom: 15px; transition: 0.2s;}

        /* PANEL CELEBRACIÓN */
        #celebracion { 
            display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); 
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center; 
        }
        .translation-box { background: #f3e5f5; padding: 30px; border-radius: 40px; border: 5px solid var(--en-pink); margin: 20px 0; min-width: 400px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .word-en { font-size: 4rem; color: var(--en-blue); font-weight: bold; display: block; }
        .word-es { font-size: 2.5rem; color: #ad1457; display: block; border-top: 2px dashed #ad1457; margin-top: 10px; padding-top: 10px; }
    </style>
</head>

<body>
    <div id="celebracion">
        <h1 style="font-size: 3rem; color: #4caf50; margin-bottom: 0;">EXCELLENT! 🌟</h1>
        <div class="translation-box">
            <span id="trans-en" class="word-en">---</span>
            <span id="trans-es" class="word-es">---</span>
        </div>
        <button class="btn-audio" style="background:#4caf50; box-shadow:0 6px 0 #1b5e20; font-size: 2rem; padding: 20px 60px;" onclick="iniciarReto()">NEXT ⏭️</button>
    </div>

    <!-- CABECERA SOLICITADA -->
    <div class="header-juego">
        <a href="../index.html" class="btn btn-volver">⬅ BACK</a>
        <h1>🇬🇧 English Land</h1>
        
        <!-- Contador con el color de English Land -->
        <div class="contador-estrellas-simple">
            ⭐ <span id="star-count">0</span>
        </div>

    </div>

    <div class="contenedor-blanco">
        <div id="instruccion" class="instruccion">English Land</div>
        <button id="btn-repetir" class="btn-audio" onclick="repetirSonido()">🔊 Hear again</button>
        <div id="juego-area"></div>
    </div>

    <script>
        let stars = 0; 
        let objetivoAudio = ""; 
        let progreso = 0; 
        let listaCorrecta = []; 
        let vocabEN = {};

        const monthsInOrder = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
        const traduccionesFijas = {
            "MONDAY":"Lunes", "TUESDAY":"Martes", "WEDNESDAY":"Miércoles", "THURSDAY":"Jueves", "FRIDAY":"Viernes", "SATURDAY":"Sábado", "SUNDAY":"Domingo",
            "JANUARY":"Enero", "FEBRUARY":"Febrero", "MARCH":"Marzo", "APRIL":"Abril", "MAY":"Mayo", "JUNE":"Junio", "JULY":"Julio", "AUGUST":"Agosto", "SEPTEMBER":"Septiembre", "OCTOBER":"Octubre", "NOVEMBER":"Noviembre", "DECEMBER":"Diciembre"
        };

        function hablar(t, lang = 'en-US') { 
            window.speechSynthesis.cancel(); 
            const m = new SpeechSynthesisUtterance(t); 
            m.lang = lang; m.rate = 0.8; 
            window.speechSynthesis.speak(m); 
        }

        function repetirSonido() { hablar(objetivoAudio); }

        function procesarDiccionario() {
            for (let cat in DICCIONARIO_GENERAL) {
                let aptas = DICCIONARIO_GENERAL[cat].filter(item => item.playEn === "Yes" && item.en);
                if (aptas.length > 0) vocabEN[cat] = aptas;
            }
        }

        function crearVisorHTML(item, tamañoEmoji = '5rem') {
            return `
                <div class="visor-en">
                    <span class="emoji-en-bg" style="font-size: ${tamañoEmoji}">${item.e}</span>
                    <img src="https://img.icons8.com/color/200/${item.q}.png" 
                         class="img-en" 
                         onload="this.previousElementSibling.style.opacity='0.05'" 
                         onerror="this.style.display='none'; this.previousElementSibling.style.opacity='1'">
                </div>`;
        }

        function iniciarReto() {
            document.getElementById('celebracion').style.display = 'none';
            const area = document.getElementById('juego-area'); area.innerHTML = ""; progreso = 0;
            if (Object.keys(vocabEN).length === 0) procesarDiccionario();
            
            const random = Math.random();
            
            if (random < 0.35) {
                let catsDisponibles = Object.keys(vocabEN);
                let catOrden = catsDisponibles.find(c => c.includes("Núm") || c.includes("Mes")) || "Animales";
                if (catOrden.includes("Núm")) {
                    listaCorrecta = [...vocabEN[catOrden]].sort((a,b) => parseInt(a.q) - parseInt(b.q));
                } else if (catOrden.includes("Mes")) {
                    listaCorrecta = [...vocabEN[catOrden]].sort((a,b) => monthsInOrder.indexOf(a.en) - monthsInOrder.indexOf(b.en));
                }
                document.getElementById('instruccion').innerText = "Order the sequence!";
                objetivoAudio = "Order the sequence";
                hablar(document.getElementById('instruccion').innerText);
                const wrap = document.createElement('div'); wrap.className = "orden-wrap";
                let listaBotones = [...listaCorrecta].sort(() => Math.random() - 0.5);
                listaBotones.forEach(item => {
                    const box = document.createElement('div'); box.className = "box-item"; box.innerText = item.e + " " + item.en;
                    box.onclick = () => {
                        if (item.en === listaCorrecta[progreso].en) {
                            hablar(item.en); box.classList.add('done'); progreso++;
                            if (progreso === listaCorrecta.length) ganar(item.en, item.n || traduccionesFijas[item.en]);
                        } else { hablar("No. Next is " + listaCorrecta[progreso].en); }
                    };
                    wrap.appendChild(box);
                });
                area.appendChild(wrap);
            } 
            else if (random < 0.70) {
                const cats = Object.keys(vocabEN);
                const cat = cats[Math.floor(Math.random() * cats.length)];
                const pool = [...vocabEN[cat]].sort(() => 0.5 - Math.random()).slice(0, 4);
                const target = pool[Math.floor(Math.random() * pool.length)];
                objetivoAudio = target.en;
                document.getElementById('instruccion').innerText = "Listen and pick!";
                hablar(objetivoAudio);
                const grid = document.createElement('div'); grid.className = "opciones-grid";
                pool.forEach(item => {
                    const card = document.createElement('div'); card.className = "card-en";
                    card.innerHTML = `${crearVisorHTML(item, '4rem')}<br><b>${item.en}</b>`;
                    card.onclick = () => { 
                        if(item.en === objetivoAudio) ganar(item.en, item.n); 
                        else { hablar("Try again"); card.style.opacity="0.3"; } 
                    };
                    grid.appendChild(card);
                });
                area.appendChild(grid);
            }
            else {
                const cats = Object.keys(vocabEN);
                const cat = cats[Math.floor(Math.random() * cats.length)];
                const item = vocabEN[cat][Math.floor(Math.random() * vocabEN[cat].length)];
                objetivoAudio = item.en;
                document.getElementById('instruccion').innerText = "Spell the word!";
                hablar("Spell " + item.en);
                area.innerHTML = `
                    ${crearVisorHTML(item, '6rem')}
                    <div class="palabra-guia">${item.en}</div>
                    <h2 style="letter-spacing:10px; font-size:3.5rem; color: #d81b60; margin: 10px 0;" id="guia"></h2>
                `;
                const guia = document.getElementById('guia'); guia.innerText = "_ ".repeat(item.en.length);
                const grid = document.createElement('div'); grid.className = "sopa-letras";
                let letrasWord = item.en.replace(/\s/g, '').split("");
                let letrasPool = [...letrasWord];
                while(letrasPool.length < 18) letrasPool.push("ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)]);
                letrasPool.sort(() => 0.5 - Math.random()).forEach(l => {
                    const box = document.createElement('div'); box.className = "letra-en"; box.innerText = l;
                    box.onclick = () => {
                        if(l === letrasWord[progreso]) {
                            hablar(l); box.classList.add('active'); box.style.pointerEvents = "none"; progreso++;
                            guia.innerText = item.en.substring(0, progreso) + "_ ".repeat(item.en.length - progreso);
                            if(progreso === letrasWord.length) ganar(item.en, item.n);
                        } else { hablar("Try the letter " + letrasWord[progreso]); }
                    };
                    grid.appendChild(box);
                });
                area.appendChild(grid);
            }
        }

        function ganar(eng, esp) { 
            stars++; document.getElementById('star-count').innerText = stars; 
            if(window.añadirEstrellaAlCofre) añadirEstrellaAlCofre();
            document.getElementById('trans-en').innerText = eng;
            document.getElementById('trans-es').innerText = esp || "---";
            document.getElementById('celebracion').style.display = 'flex'; 
            hablar(eng, 'en-US');
            setTimeout(() => { hablar("means " + esp, 'en-US'); }, 1000);
        }

        window.onload = iniciarReto;
    </script>
</body>
</html>
