<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¿Quién suena? 👂</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../progreso.js"></script>
    
    <!-- CORREGIDO: Ahora busca Instrumentos.js -->
    <script src="Instrumentos.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { margin: 0; font-family: 'Fredoka', sans-serif; text-align: center; }
        .header-juego { background: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #9c27b0; }
        .btn-volver { background: #546e7a; color: white !important; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0 #37474f; }
        .contenedor-blanco { max-width: 1100px; margin: 20px auto; background: rgba(255, 255, 255, 0.95); border-radius: 50px; padding: 30px; border: 8px solid #9c27b0; box-shadow: 0 20px 0 #e1bee7; min-height: 550px; position: relative; }
        
        .btn-reproducir { width: 140px; height: 140px; background: #9c27b0; color: white; border-radius: 50%; border: none; font-size: 5rem; cursor: pointer; box-shadow: 0 10px 0 #7b1fa2; margin: 20px auto; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-reproducir.sonando { animation: pulso 1s infinite; background: #e91e63; }
        @keyframes pulso { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .grid-fotos { display: flex; flex-direction: row; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .card-foto { width: 240px; height: 260px; background: white; border: 6px solid #eee; border-radius: 40px; padding: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 0 #eee; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-foto:hover { transform: translateY(-5px); border-color: #9c27b0; }
        .img-box { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: white; border-radius: 25px; overflow: hidden; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-foto.error { opacity: 0.3; filter: grayscale(1); pointer-events: none; }

        #celebracion { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .btn-verde { background: #4caf50; color: white; padding: 20px 60px; border-radius: 50px; border: none; font-size: 2rem; cursor: pointer; box-shadow: 0 8px 0 #1b5e20; font-weight: bold; margin-top: 20px;}
    </style>
</head>
<body class="isla-tema bg-musica">
    <div id="celebracion">
        <h1 style="font-size: 3.5rem; color: #9c27b0;">¡MUY BIEN! 🌟</h1>
        <div style="width: 450px; height: 300px; border-radius: 30px; overflow: hidden; border: 10px solid white; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <img src="" id="img-celebra" style="max-width: 100%; max-height: 100%; object-fit: contain;">
        </div>
        <h2 id="nombre-celebra" style="color: #7b1fa2;"></h2>
        <button class="btn-verde" onclick="nuevoReto()">Siguiente ⏭️</button>
    </div>

    <div class="header-juego">
        <a href="musica-menu.html" class="btn btn-volver">⬅ MENÚ MÚSICA</a>
        <h2 id="stars" style="margin:0; font-size: 2rem; color: #9c27b0;">⭐ 0</h2>
    </div>

    <div class="contenedor-blanco">
        <h1 id="titulo-pregunta" style="color: #7b1fa2; margin-top: 0;">¿Qué instrumento suena?</h1>
        <button id="playBtn" class="btn-reproducir" onclick="reproducirSonido()">🔊</button>
        <div id="opciones" class="grid-fotos"></div>
    </div>

    <script>
        let correcto = null; 
        let audioActual = new Audio();

        function reproducirSonido() {
            if(!correcto) return;
            audioActual.src = "sonidos/" + correcto.s;
            audioActual.play().catch(e => console.log("Error de audio: ", e));
            document.getElementById('playBtn').classList.add('sonando');
            audioActual.onended = () => document.getElementById('playBtn').classList.remove('sonando');
        }

        function nuevoReto() {
            if (typeof GLOSARIO_INSTRUMENTOS === 'undefined') {
                document.getElementById('titulo-pregunta').innerText = "No se encuentra Instrumentos.js";
                return;
            }

            document.getElementById('celebracion').style.display = 'none';
            const area = document.getElementById('opciones'); 
            area.innerHTML = "";
            
            // 1. Buscamos instrumentos que tengan sonido en el JS
            const conAudio = GLOSARIO_INSTRUMENTOS.filter(i => i.s !== "");
            
            if(conAudio.length === 0) {
                document.getElementById('titulo-pregunta').innerText = "⚠️ No hay audios en Instrumentos.js";
                return;
            }

            correcto = conAudio[Math.floor(Math.random() * conAudio.length)];
            
            // 2. Distractores (cualquiera que no sea el correcto)
            const distractores = GLOSARIO_INSTRUMENTOS
                .filter(i => i.n !== correcto.n)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);
            
            const opciones = [correcto, ...distractores].sort(() => Math.random() - 0.5);
            
            opciones.forEach(ins => {
                const card = document.createElement('div'); 
                card.className = "card-foto";
                card.innerHTML = `<div class="img-box"><img src="Instrumentos/${ins.f}" onerror="this.src='https://via.placeholder.com/200?text=No+Foto'"></div>`;
                card.onclick = () => {
                    if(ins.n === correcto.n) ganar();
                    else { card.classList.add('error'); window.speechSynthesis.speak(new SpeechSynthesisUtterance("No, ese no es")); }
                };
                area.appendChild(card);
            });
            setTimeout(reproducirSonido, 500);
        }

        function ganar() {
            document.getElementById('img-celebra').src = "Instrumentos/" + correcto.f;
            document.getElementById('nombre-celebra').innerText = correcto.n.toUpperCase();
            document.getElementById('celebracion').style.display = 'flex';
            if (typeof añadirEstrellaAlCofre === 'function') añadirEstrellaAlCofre();
            
            // Actualizar estrellas visuales
            let txt = document.getElementById('stars').innerText;
            let num = parseInt(txt.split(' ')[1]) + 1;
            document.getElementById('stars').innerText = "⭐ " + num;
        }

        window.onload = nuevoReto;
    </script>
</body>
</html>
