<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¿Dónde está? 📸</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../progreso.js"></script>
    <script src="Instrumentos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        
        body { 
            margin: 0; font-family: 'Fredoka', sans-serif; text-align: center; 
            background: #fce4ec; 
        }

        .header-juego { background: white; padding: 15px 30px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #e91e63; }
        .btn-volver { background: #546e7a; color: white !important; padding: 8px 15px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        .contenedor-blanco { 
            max-width: 1150px; margin: 20px auto; background: rgba(255, 255, 255, 0.95); 
            border-radius: 50px; padding: 30px; border: 8px solid #e91e63; 
            box-shadow: 0 20px 0 #f8bbd0; min-height: 550px; position: relative; 
        }

        h1 { color: #ad1457; font-size: 2.5rem; margin-bottom: 10px; }
        
        .grid-fotos {
            display: flex; flex-direction: row; flex-wrap: nowrap; 
            justify-content: center; gap: 20px; margin-top: 30px;
        }

        .card-foto {
            width: 250px; height: 300px; background: white; border: 6px solid #eee; 
            border-radius: 40px; padding: 15px; cursor: pointer; transition: 0.3s; 
            box-shadow: 0 10px 0 #eee; display: flex; flex-direction: column; align-items: center; flex-shrink: 0;
        }
        .card-foto:hover { transform: translateY(-10px); border-color: #e91e63; }
        .card-foto.error { opacity: 0.2; filter: grayscale(1); pointer-events: none; }
        
        .img-box {
            width: 100%; height: 190px; border-radius: 25px; overflow: hidden;
            margin-bottom: 15px; background: white; border: 1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: center;
        }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* CELEBRACIÓN */
        #celebracion {
            display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .nombre-ganador { font-size: 3.5rem; color: #ad1457; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        .nombre-en { font-size: 1.8rem; color: #1e88e5; margin-bottom: 20px; font-weight: 600; }
        .btn-verde { background: #4caf50; color: white; padding: 20px 60px; border-radius: 50px; border: none; font-size: 2rem; cursor: pointer; box-shadow: 0 8px 0 #1b5e20; font-weight: bold; }
    </style>
</head>
<body class="isla-tema bg-musica">

    <div id="celebracion">
        <h1 class="nombre-ganador" id="txt-es"></h1>
        <h2 class="nombre-en" id="txt-en"></h2>
        <div style="width: 450px; height: 320px; border-radius: 30px; overflow: hidden; border: 10px solid white; background: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <img src="" id="img-celebra" style="max-width: 100%; max-height: 100%; object-fit: contain;">
        </div>
        <button class="btn-verde" onclick="nuevoReto()" style="margin-top:20px">Siguiente ⏭️</button>
    </div>

    <div class="header-juego">
        <a href="musica-menu.html" class="btn btn-volver">⬅ MENÚ MÚSICA</a>
        <h1 style="color: #ad1457; margin:0; font-size: 1.8rem;">📸 ¿Dónde está?</h1>
        <h2 id="stars" style="margin:0; font-size: 2rem; color: #ad1457;">⭐ 0</h2>
    </div>

    <div class="contenedor-blanco">
        <h1 id="pregunta-inst">Cargando...</h1>
        <p style="font-size: 1.4rem; color: #ad1457; font-weight: bold;">Toca la foto correcta</p>
        <div id="opciones" class="grid-fotos"></div>
    </div>

    <script>
        let estrellas = 0; let correcto = null; let audioMp3 = new Audio();
        function decir(t, lang) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = lang; window.speechSynthesis.speak(m); }
        
        function nuevoReto() {
            document.getElementById('celebracion').style.display = 'none';
            audioMp3.pause();
            const area = document.getElementById('opciones'); area.innerHTML = "";
            const opciones = [...GLOSARIO_INSTRUMENTOS].sort(() => Math.random() - 0.5).slice(0, 4);
            correcto = opciones[Math.floor(Math.random() * 4)];
            document.getElementById('pregunta-inst').innerText = "¿Donde está " + correcto.n + "?";
            decir(document.getElementById('pregunta-inst').innerText, 'es-ES');

            opciones.forEach(ins => {
                const card = document.createElement('div'); card.className = "card-foto";
                card.innerHTML = `<div class="img-box"><img src="Instrumentos/${ins.f}"></div><b>${ins.n}</b>`;
                card.onclick = () => {
                    if(ins.n === correcto.n) ganar();
                    else { card.classList.add('error'); decir("No, ese no es", 'es-ES'); }
                };
                area.appendChild(card);
            });
        }

        function ganar() {
            estrellas++; document.getElementById('stars').innerText = "⭐ Estrellas: " + estrellas;
            document.getElementById('img-celebra').src = "Instrumentos/" + correcto.f;
            document.getElementById('txt-es').innerText = "¡MUY BIEN! ES " + correcto.n.toUpperCase();
            document.getElementById('txt-en').innerText = "🇬🇧 " + correcto.en;
            document.getElementById('celebracion').style.display = 'flex';
            if (correcto.s !== "") { audioMp3.src = "sonidos/" + correcto.s; audioMp3.play(); }
            decir(correcto.n, 'es-ES');
            añadirEstrellaAlCofre();
        }
        window.onload = nuevoReto;
    </script>
</body>
</html>
