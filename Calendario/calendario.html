<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Isla del Tiempo 📅</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { 
            margin: 0; font-family: 'Fredoka', sans-serif; text-align: center;
            background: #f3e5f5 url('../Recursos/Imagenes/fondo_calendario.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        /* Capa para que el fondo sea suave */
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: -1; }

        .header-juego { background: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #9c27b0; }
        .btn-volver { background: #546e7a; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0 #37474f; }
        
        .menu-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; padding: 50px; }
        .card-t { 
            background: white; border-radius: 40px; padding: 30px; width: 250px; height: 220px; 
            text-decoration: none; border: 8px solid #9c27b0; box-shadow: 0 12px 0 #e1bee7; 
            transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #4a148c;
        }
        .card-t:hover { transform: translateY(-10px); }
        .card-t span { font-size: 5rem; margin-bottom: 15px; }
        .card-t h2 { margin: 0; font-size: 1.8rem; }
    </style>
</head>
<body>
    <div class="header-juego">
        <a href="../index.html" class="btn-volver">⬅ MAPA PRINCIPAL</a>
        <h1 style="color: #4a148c; margin: 0;">📅 Calendario</h1>
    </div>
    <div class="menu-grid">
        <a href="calendario-dia.html" class="card-t">
            <span>☀️</span>
            <h2>Mi Día</h2>
        </a>
        <a href="calendario-reloj.html" class="card-t" style="border-color: #2196f3; box-shadow: 0 12px 0 #bbdefb; color: #0d47a1;">
            <span>⏰</span>
            <h2>El Reloj</h2>
        </a>
    </div>
</body>
</html>
