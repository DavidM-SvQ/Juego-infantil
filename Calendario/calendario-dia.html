<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Calendario del Día ☀️</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <script src="../progreso.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { 
            margin: 0; font-family: 'Fredoka', sans-serif; text-align: center;
            background: #e1f5fe url('../Recursos/Imagenes/fondo_calendario.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: -1; }

        .header-juego { background: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #0288d1; }
        .btn-volver { background: #546e7a; color: white !important; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0 #37474f; }

        .contenedor-blanco { max-width: 1000px; margin: 20px auto; background: white; border-radius: 50px; padding: 30px; border: 8px solid #03a9f4; box-shadow: 0 15px 0 #b3e5fc; position: relative; }

        .pizarra-hoy { background: #fff9c4; border: 5px dashed #fbc02d; border-radius: 30px; padding: 25px; margin-bottom: 30px; }
        .frase-hoy { font-size: 2.1rem; color: #f57f17; font-weight: bold; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center; }
        
        .hueco { 
            background: white; border: 3px solid #fbc02d; border-radius: 15px; 
            padding: 8px 18px; min-width: 100px; color: #1a237e; min-height: 50px; 
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }

        /* RESALTADO EN ROJO */
        .hueco.error { border-color: #f44336; background: #ffebee; color: #d32f2f; animation: vibrar 0.3s; }
        @keyframes vibrar { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .seccion-selector { margin-bottom: 15px; padding: 12px; background: #f1f8e9; border-radius: 20px; border: 1px solid #e0e0e0; }
        .titulo-sec { color: #2e7d32; font-size: 1rem; margin: 0 0 10px 0; text-transform: uppercase; font-weight: bold; }
        .grupo-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }

        .btn-opcion { background: white; border: 3px solid #81c784; padding: 10px 15px; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #c5e1a5; transition: 0.1s; }
        .btn-opcion.selected { background: #4caf50; color: white; border-color: #1b5e20; }

        .sec-especial { background: #fff3e0; }
        .sec-especial .titulo-sec { color: #e65100; }
        .sec-especial .btn-opcion { border-color: #ffb74d; box-shadow: 0 4px 0 #ffe0b2; }

        .btn-verificar { display: block; margin: 30px auto 10px auto; background: #ff4081; color: white; padding: 20px 50px; border-radius: 50px; border: none; font-size: 2rem; cursor: pointer; box-shadow: 0 8px 0 #c2185b; font-weight: bold; }

        /* CARTELES DE MENSAJE */
        #celebracion, #cartel-error { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        #cartel-error { background: rgba(255,235,238,0.97); }
        .ventana { background: white; padding: 40px; border-radius: 40px; border: 10px solid; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <!-- CARTEL DE ERROR -->
    <div id="cartel-error" onclick="this.style.display='none'">
        <div class="ventana" style="border-color: #f44336;">
            <h1 style="font-size: 6rem; margin:0;">🧐</h1>
            <h1 style="color: #d32f2f; font-size: 2.5rem;">¡Casi lo tienes!</h1>
            <p style="font-size: 1.5rem; color: #333;">Hay algunos datos que no son correctos.<br>Fíjate en los cuadros rojos.</p>
            <button class="btn-verificar" style="background:#f44336; box-shadow: 0 8px 0 #b71c1c;">CORREGIR ✍️</button>
        </div>
    </div>

    <!-- CARTEL DE ÉXITO -->
    <div id="celebracion">
        <div class="ventana" style="border-color: #4caf50;">
            <h1 style="font-size: 6rem; margin:0;">🌟</h1>
            <h1 style="color: #2e7d32; font-size: 2.5rem;">¡PERFECTO!</h1>
            <p id="resumen-voz" style="font-size: 1.2rem; color: #555;"></p>
            <button class="btn-verificar" style="background:#4caf50; box-shadow: 0 8px 0 #1b5e20;" onclick="location.reload()">Siguiente ⏭️</button>
        </div>
    </div>

    <div class="header-juego">
        <a href="calendario.html" class="btn-volver">⬅ MENÚ CALENDARIO</a>
        <h1 style="color: #0288d1; margin: 0;">📅 Mi Calendario</h1>
    </div>

    <div class="contenedor-blanco">
        <div class="pizarra-hoy">
            <div class="frase-hoy">
                Hoy es <div id="h-sem" class="hueco">...</div>, día <div id="h-num" class="hueco">...</div> de <div id="h-mes" class="hueco">...</div> del año <div id="h-año" class="hueco">...</div>
            </div>
            <div class="frase-hoy" style="margin-top: 20px;">
                El tiempo está <div id="h-cli" class="hueco">...</div> y estamos en <div id="h-est" class="hueco">...</div>
            </div>
        </div>

        <div class="seccion-selector"><p class="titulo-sec">Día de la semana</p><div id="btns-sem" class="grupo-btns"></div></div>
        <div class="seccion-selector"><p class="titulo-sec">Número</p><div id="btns-num" class="grupo-btns"></div></div>
        <div class="seccion-selector"><p class="titulo-sec">Mes</p><div id="btns-mes" class="grupo-btns"></div></div>
        <div class="seccion-selector sec-especial"><p class="titulo-sec">Año</p><div id="btns-año" class="grupo-btns"></div></div>
        <div class="seccion-selector sec-especial"><p class="titulo-sec">¿Qué tiempo hace hoy?</p><div id="btns-cli" class="grupo-btns"></div></div>
        <div class="seccion-selector sec-especial"><p class="titulo-sec">Estación del año</p><div id="btns-est" class="grupo-btns"></div></div>

        <button class="btn-verificar" onclick="verificarTodo()">¡COMPROBAR! ✅</button>
    </div>

    <script>
        const datos = {
            sem: ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"],
            mes: ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"],
            est: ["Invierno", "Invierno", "Primavera", "Primavera", "Primavera", "Verano", "Verano", "Verano", "Otoño", "Otoño", "Otoño", "Invierno"],
            año: ["2024", "2025", "2026"]
        };
        const sel = { sem:"", num:"", mes:"", año:"", cli:"", est:"" };

        function hablar(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }

        function crearBotones() {
            ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"].forEach(s => {
                const b = document.createElement('button'); b.className = "btn-opcion"; b.innerText = s;
                b.onclick = () => { marcarSeleccion('btns-sem', b); sel.sem = s; actualizar(); hablar(s); };
                document.getElementById('btns-sem').appendChild(b);
            });
            for(let i=1; i<=31; i++){
                const b = document.createElement('button'); b.className = "btn-opcion"; b.innerText = i;
                b.onclick = () => { marcarSeleccion('btns-num', b); sel.num = i; actualizar(); hablar(i.toString()); };
                document.getElementById('btns-num').appendChild(b);
            }
            datos.mes.forEach(m => {
                const b = document.createElement('button'); b.className = "btn-opcion"; b.innerText = m;
                b.onclick = () => { marcarSeleccion('btns-mes', b); sel.mes = m; actualizar(); hablar(m); };
                document.getElementById('btns-mes').appendChild(b);
            });
            datos.año.forEach(a => {
                const b = document.createElement('button'); b.className = "btn-opcion"; b.innerText = a;
                b.onclick = () => { marcarSeleccion('btns-año', b); sel.año = a; actualizar(); hablar(a); };
                document.getElementById('btns-año').appendChild(b);
            });
            [{n:"Soleado", e:"☀️"}, {n:"Nublado", e:"☁️"}, {n:"Lluvioso", e:"🌧️"}, {n:"Tormenta", e:"⛈️"}, {n:"Nieve", e:"❄️"}].forEach(c => {
                const b = document.createElement('button'); b.className = "btn-opcion"; b.innerText = c.e + " " + c.n;
                b.onclick = () => { marcarSeleccion('btns-cli', b); sel.cli = c.e + " " + c.n; actualizar(); hablar(c.n); };
                document.getElementById('btns-cli').appendChild(b);
            });
            [{n:"Primavera", e:"🌸"}, {n:"Verano", e:"☀️"}, {n:"Otoño", e:"🍂"}, {n:"Invierno", e:"❄️"}].forEach(e => {
                const b = document.createElement('button'); b.className = "btn-opcion"; b.innerText = e.e + " " + e.n;
                b.onclick = () => { marcarSeleccion('btns-est', b); sel.est = e.e + " " + e.n; actualizar(); hablar(e.n); };
                document.getElementById('btns-est').appendChild(b);
            });
        }

        function marcarSeleccion(contenedorId, boton) {
            document.querySelectorAll(`#${contenedorId} .btn-opcion`).forEach(b => b.classList.remove('selected'));
            boton.classList.add('selected');
        }

        function actualizar() {
            document.querySelectorAll('.hueco').forEach(h => h.classList.remove('error'));
            document.getElementById('h-sem').innerText = sel.sem || "...";
            document.getElementById('h-num').innerText = sel.num || "...";
            document.getElementById('h-mes').innerText = sel.mes || "...";
            document.getElementById('h-año').innerText = sel.año || "...";
            document.getElementById('h-cli').innerText = sel.cli || "...";
            document.getElementById('h-est').innerText = sel.est || "...";
        }

        function verificarTodo() {
            const hoy = new Date();
            const real = {
                sem: datos.sem[hoy.getDay()],
                num: hoy.getDate(),
                mes: datos.mes[hoy.getMonth()],
                año: hoy.getFullYear().toString(),
                est: datos.est[hoy.getMonth()]
            };

            let hayErrores = false;
            document.querySelectorAll('.hueco').forEach(h => h.classList.remove('error'));

            if (!sel.sem || !sel.num || !sel.mes || !sel.año || !sel.cli || !sel.est) {
                hablar("Completa todo el calendario primero."); return;
            }

            if (sel.sem !== real.sem) { document.getElementById('h-sem').classList.add('error'); hayErrores = true; }
            if (sel.num != real.num) { document.getElementById('h-num').classList.add('error'); hayErrores = true; }
            if (sel.mes !== real.mes) { document.getElementById('h-mes').classList.add('error'); hayErrores = true; }
            if (sel.año !== real.año) { document.getElementById('h-año').classList.add('error'); hayErrores = true; }
            if (!sel.est.includes(real.est)) { document.getElementById('h-est').classList.add('error'); hayErrores = true; }

            if (hayErrores) {
                document.getElementById('cartel-error').style.display = "flex";
                hablar("¡Oh no! Hay algunos errores. Fíjate en los cuadros rojos.");
            } else {
                const frase = `Hoy es ${sel.sem} ${sel.num} de ${sel.mes} de ${sel.año}. Hace un día ${sel.cli.split(' ')[1]} y estamos en ${sel.est.split(' ')[1]}.`;
                document.getElementById('resumen-voz').innerText = frase;
                document.getElementById('celebracion').style.display = "flex";
                añadirEstrellaAlCofre();
                hablar("¡Excelente! Lo has hecho muy bien.");
            }
        }

        window.onload = crearBotones;
    </script>
</body>
</html>
