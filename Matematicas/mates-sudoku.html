<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sudoku Infantil 🧩</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <link rel="stylesheet" href="../style.css">
    <script src="../progreso.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { margin: 0; font-family: 'Fredoka', sans-serif; text-align: center; user-select: none; }
        
        /* CABECERA COMPACTA */
        .header-juego { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid #2196F3; }
        .header-juego h1 { color: #1565c0; margin: 0; font-size: 1.8rem; }
        .btn-volver { background: #546e7a; color: white !important; padding: 8px 18px; border-radius: 20px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0 #37474f; font-size: 0.9rem; }
        
        .contenedor-blanco { max-width: 900px; margin: 20px auto; background: white; border-radius: 50px; padding: 30px; border: 8px solid #2196F3; box-shadow: 0 15px 0 #bbdefb; position: relative; }
        .zona-vidas { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; font-size: 2rem; }
        .vida-emoji { transition: 0.3s; }
        .vida-emoji.perdida { filter: grayscale(100%); opacity: 0.15; transform: scale(0.8); }
        #aviso-vida { height: 25px; color: #f44336; font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; visibility: hidden; }
        .grid-sudoku { display: grid; grid-template-columns: repeat(4, 85px); gap: 8px; margin: 10px auto; width: fit-content; background: #1565c0; padding: 12px; border-radius: 15px; }
        .celda { width: 85px; height: 85px; background: white; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; cursor: pointer; border-radius: 8px; color: #1e88e5; }
        .celda.fija { background: #eee; color: #455a64; cursor: default; }
        .celda.resaltado-linea { background: #e3f2fd; }
        .celda.seleccionada { background: #fff176 !important; border: 4px solid #fbc02d; z-index: 5; }
        .celda.error { background: #ffcdd2 !important; color: #f44336 !important; }
        .celda.revelada { color: #4caf50; background: #e8f5e9; border: 3px solid #4caf50; } 
        .btn-tecla { width: 75px; height: 75px; background: white; border: 4px solid #2196F3; border-radius: 20px; font-size: 2.5rem; font-weight: bold; color: #2196F3; cursor: pointer; box-shadow: 0 5px 0 #bbdefb; }
        #celebracion { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.96); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="isla-tema bg-mates">
    <div id="celebracion">
        <h1 style="font-size: 8rem; margin:0;">🌟</h1>
        <h1 style="font-size: 4rem; color: #2196F3;">¡SUDOKU RESUELTO!</h1>
        <button style="background:#4caf50; color:white; padding:20px 60px; border-radius:50px; border:none; font-size:2rem;" onclick="generarSudoku()">¡Otro! ⏭️</button>
    </div>
    <div class="header-juego">
        <a href="mates.html" class="btn-volver">⬅ ATRÁS</a>
        <h1>🧩 Sudoku</h1>
        <div style="font-size: 1.8rem; font-weight: bold; color: #2196F3;">⭐ <span id="stars-count">0</span></div>
    </div>
    <div class="contenedor-blanco">
        <div class="zona-vidas"><span class="vida-emoji" id="v-1">❤️</span><span class="vida-emoji" id="v-2">❤️</span><span class="vida-emoji" id="v-3">❤️</span><span class="vida-emoji" id="v-4">❤️</span><span class="vida-emoji" id="v-5">❤️</span></div>
        <div id="aviso-vida">⚠️ ¡ÚLTIMA VIDA!</div>
        <div id="tablero" class="grid-sudoku"></div>
        <div id="controles-area">
            <div style="display:flex; justify-content:center; gap:12px; margin: 15px 0;">
                <button class="btn-tecla" onclick="escribir(1)">1</button><button class="btn-tecla" onclick="escribir(2)">2</button><button class="btn-tecla" onclick="escribir(3)">3</button><button class="btn-tecla" onclick="escribir(4)">4</button><button class="btn-tecla" style="color:#78909c;" onclick="escribir('')">❌</button>
            </div>
            <button id="btn-comprobar" class="btn-tecla" style="background:#4caf50; color:white; width:100%; height:auto; padding:15px; border:none;" onclick="verificar()" disabled>Comprobar ✅</button>
        </div>
        <button id="btn-nuevo" class="btn-tecla" style="display:none; background:#ff9800; color:white; width:100%; height:auto; padding:15px; border:none;" onclick="generarSudoku()">Intentar otro sudoku ⏭️</button>
    </div>
    <script>
        let solucion = []; let vidas = 5; let sel = null; let estrellas = 0;
        function hablar(t) { window.speechSynthesis.cancel(); window.speechSynthesis.speak(new SpeechSynthesisUtterance(t)); }
        function generarSudoku() {
            document.getElementById('celebracion').style.display = 'none'; document.getElementById('btn-nuevo').style.display = 'none'; document.getElementById('controles-area').style.display = 'block'; document.getElementById('aviso-vida').style.visibility = 'hidden';
            const tab = document.getElementById('tablero'); tab.innerHTML = ""; vidas = 5; sel = null;
            for(let i=1; i<=5; i++) document.getElementById('v-'+i).classList.remove('perdida');
            let base = [[1,2,3,4],[3,4,1,2],[2,3,4,1],[4,1,2,3]];
            let nums = [1,2,3,4].sort(() => Math.random() - 0.5);
            let mapeo = { 1: nums[0], 2: nums[1], 3: nums[2], 4: nums[3] };
            solucion = base.flat().map(n => mapeo[n]);
            let pistas = Array.from({length: 16}, (_, i) => i).sort(() => Math.random() - 0.5).slice(0, 6);
            solucion.forEach((num, i) => {
                const div = document.createElement('div'); div.className = "celda"; div.dataset.row = Math.floor(i / 4); div.dataset.col = i % 4;
                if (pistas.includes(i)) { div.innerText = num; div.classList.add('fija'); }
                div.onclick = () => { if (vidas === 0) return; document.querySelectorAll('.celda').forEach(c => c.classList.remove('seleccionada', 'resaltado-linea'));
                    document.querySelectorAll('.celda').forEach(c => { if(c.dataset.row === div.dataset.row || c.dataset.col === div.dataset.col) c.classList.add('resaltado-linea'); });
                    if(!div.classList.contains('fija')){ sel = div; div.classList.add('seleccionada'); } else { sel = null; } };
                tab.appendChild(div);
            });
            checkReady();
        }
        function escribir(n) { if(sel) { sel.innerText = n; sel.classList.remove('error'); checkReady(); } }
        function checkReady() { document.getElementById('btn-comprobar').disabled = [...document.querySelectorAll('.celda')].some(c => c.innerText === ""); }
        function verificar() {
            const celdas = document.querySelectorAll('.celda'); let errores = 0;
            celdas.forEach((c, i) => { if(parseInt(c.innerText) !== solucion[i]) { c.classList.add('error'); errores++; } else { c.classList.remove('error'); } });
            if(errores === 0) { estrellas++; document.getElementById('stars-count').innerText = estrellas; añadirEstrellaAlCofre(); document.getElementById('celebracion').style.display = 'flex'; hablar("¡Genial!");
            } else { document.getElementById('v-'+vidas).classList.add('perdida'); vidas--;
                if(vidas === 1) { document.getElementById('aviso-vida').style.visibility = 'visible'; hablar("¡Es tu última vida!"); }
                if(vidas === 0) { celdas.forEach((c, i) => { if(!c.classList.contains('fija')) { c.innerText = solucion[i]; c.classList.add('revelada'); } c.classList.remove('error', 'seleccionada', 'resaltado-linea'); });
                    document.getElementById('controles-area').style.display = 'none'; document.getElementById('btn-nuevo').style.display = 'block'; hablar("Mira la solución."); } else { hablar("Hay errores."); } }
        }
        window.onload = generarSudoku;
    </script>
</body>
</html>
