<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crucigrama 🧩</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <link rel="stylesheet" href="../style.css">
    <script src="../diccionario.js"></script>
    <script src="../progreso.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        
        body { margin: 0; font-family: 'Fredoka', sans-serif; text-align: center; overflow-x: hidden; background-color: #f8f9fa; }

        /* FONDO CON TRANSPARENCIA IDENTICA A LETRAS.HTML (12%) */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('../Recursos/Imagenes/fondo_letras.jpg') no-repeat center center fixed;
            background-size: cover; opacity: 0.12; z-index: -1;
        }
        
        .header-juego { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid #FF9800; }
        .btn-volver { background: #546e7a; color: white !important; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0 #37474f; }
        
        .contenedor-blanco { max-width: 950px; margin: 15px auto; background: white; border-radius: 50px; padding: 20px; border: 8px solid #FF9800; box-shadow: 0 15px 0 #ffe0b2; min-height: 85vh; position: relative; }
        
        /* ÁREA DE AYUDA Y AUDIO */
        .zona-ayuda { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        
        .ayuda-cr { background: #fff8e1; padding: 15px; border-radius: 25px; border: 4px solid #FF9800; font-weight: bold; min-height: 80px; display: flex; align-items: center; justify-content: center; gap: 20px; font-size: 1.8rem; color: #E65100; flex-grow: 1; max-width: 600px;}

        .btn-repetir {
            background: #ff9800; color: white; border: none; padding: 15px 25px; 
            border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 0 #e65100; transition: 0.2s;
            display: inline-flex; align-items: center; gap: 10px;
        }
        .btn-repetir:active { transform: translateY(3px); box-shadow: none; }

        /* CUADRÍCULA */
        .grid-crucigrama { 
            display: grid; 
            grid-template-columns: repeat(12, 65px); 
            grid-template-rows: repeat(12, 65px); 
            gap: 4px; 
            background: #eee; 
            padding: 10px; 
            margin: 0 auto; 
            width: fit-content; 
            border-radius: 15px; 
            border: 4px solid #ddd;
        }

        .celda { 
            width: 65px; height: 65px; 
            background: #f5f5f5; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; font-size: 2.5rem; font-weight: bold; 
            color: #333; cursor: pointer; transition: 0.2s;
            border: 1px solid #ccc;
        }

        .celda.activa { background: white; border: 3px solid #FF9800; }
        .celda.seleccionada { background: #fff8e1 !important; border: 4px solid #fbc02d !important; transform: scale(1.05); z-index: 5; }
        .celda.ok { background: #c8e6c9 !important; border-color: #4caf50 !important; color: #2e7d32; }

        /* TECLADO */
        .teclado-virtual { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 850px; margin: 25px auto; }
        .tecla { width: 55px; height: 55px; background: white; border: 3px solid #FF9800; border-radius: 12px; font-size: 1.8rem; font-weight: bold; color: #E65100; cursor: pointer; box-shadow: 0 4px 0 #ffe0b2; transition: 0.1s; }
        .tecla:active { transform: translateY(3px); box-shadow: none; }
        .tecla.borrar { background: #ffcdd2; border-color: #f44336; color: #b71c1c; width: 80px; box-shadow: 0 4px 0 #ef9a9a; }

        #celebracion { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.96); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .btn-next { background: #4caf50; color: white; padding: 20px 60px; font-size: 2rem; border-radius: 50px; border: none; cursor: pointer; box-shadow: 0 8px 0 #1b5e20; font-weight: bold; }
    </style>
</head>

<body class="isla-tema">
    <div id="celebracion">
        <h1 style="font-size: 8rem; margin:0;">🌟</h1>
        <h1 style="font-size: 4rem; color: #E65100;">¡CRUCIGRAMA LISTO!</h1>
        <button class="btn-next" onclick="siguienteJuego()">Siguiente ⏭️</button>
    </div>

    <div class="header-juego">
        <a href="letras.html" class="btn-volver">⬅ MENÚ LETRAS</a>
        <h1 style="color: #E65100; font-size: 1.8rem; margin:0;">🧩 Crucigrama</h1>
        <div style="font-size: 2.2rem; font-weight: bold; color: #FF9800;">⭐ <span id="stars-count">0</span></div>
    </div>

    <div class="contenedor-blanco">
        <div class="zona-ayuda">
            <div id="pista-cr" class="ayuda-cr">¡Toca un cuadro blanco!</div>
            <button class="btn-repetir" onclick="repetirPalabras()">🔊 Escuchar palabras</button>
        </div>
        
        <div id="grid-cr" class="grid-crucigrama"></div>
        <div class="teclado-virtual" id="teclado"></div>
    </div>

    <script>
        let estrellas = 0;
        let celdaEnFoco = null;
        let palabrasDelReto = []; 
        const letras = "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("");

        function hablar(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }

        function repetirPalabras() {
            if (palabrasDelReto.length > 0) {
                let msg = "Las palabras a escribir son " + palabrasDelReto[0];
                if (palabrasDelReto[1]) msg += " y " + palabrasDelReto[1];
                hablar(msg);
            }
        }

        function crearTeclado() {
            const area = document.getElementById('teclado');
            area.innerHTML = "";
            letras.forEach(l => {
                const btn = document.createElement('button');
                btn.className = "tecla";
                btn.innerText = l;
                btn.onclick = () => presionarTecla(l);
                area.appendChild(btn);
            });
            const btnBorrar = document.createElement('button');
            btnBorrar.className = "tecla borrar";
            btnBorrar.innerText = "⌫";
            btnBorrar.onclick = () => presionarTecla('BORRAR');
            area.appendChild(btnBorrar);
        }

        function presionarTecla(l) {
            if(!celdaEnFoco) { hablar("Toca primero un cuadro"); return; }
            if(l === 'BORRAR') {
                celdaEnFoco.innerText = "";
                celdaEnFoco.classList.remove('ok');
            } else {
                hablar(l);
                celdaEnFoco.innerText = l;
                if(l === celdaEnFoco.dataset.letra) {
                    celdaEnFoco.classList.add('ok');
                    verificarGanador();
                } else {
                    celdaEnFoco.classList.remove('ok');
                }
            }
        }

        function nuevoReto() {
            document.getElementById('celebracion').style.display = 'none';
            document.getElementById('pista-cr').innerText = "¡Toca un cuadro blanco!";
            const grid = document.getElementById('grid-cr');
            grid.innerHTML = "";
            celdaEnFoco = null;
            palabrasDelReto = [];

            const cats = Object.keys(DICCIONARIO_GENERAL);
            const cat = cats[Math.floor(Math.random() * cats.length)];
            const lista = [...DICCIONARIO_GENERAL[cat]].sort(() => Math.random() - 0.5);

            let p1, p2, cruce = null;
            for(let i=0; i<lista.length; i++) {
                for(let j=i+1; j<lista.length; j++) {
                    cruce = buscarLetra(lista[i].n, lista[j].n);
                    if(cruce) { p1 = lista[i]; p2 = lista[j]; break; }
                }
                if(cruce) break;
            }
            if(!cruce) { p1 = lista[0]; p2 = null; }

            palabrasDelReto.push(p1.n);
            if(p2) palabrasDelReto.push(p2.n);

            let fH = 6, cH = 3; 
            for(let i=0; i<p1.n.length; i++) { grid.appendChild(crearCelda(fH, cH + i, p1.n[i], p1.e)); }

            if(p2 && cruce) {
                let colV = cH + cruce.idx1;
                let fV_start = fH - cruce.idx2;
                for(let j=0; j<p2.n.length; j++) {
                    let f = fV_start + j, c = colV;
                    let exist = grid.querySelector(`[data-pos="${f}-${c}"]`);
                    if(!exist) grid.appendChild(crearCelda(f, c, p2.n[j], p2.e));
                    else exist.dataset.emoji2 = p2.e;
                }
            }
        }

        function buscarLetra(w1, w2) {
            for(let i=0; i<w1.length; i++) {
                for(let j=0; j<w2.length; j++) { if(w1[i] === w2[j]) return { idx1: i, idx2: j }; }
            }
            return null;
        }

        function crearCelda(r, c, letra, emoji) {
            const div = document.createElement('div');
            div.className = "celda activa"; 
            div.style.gridRow = r; div.style.gridColumn = c;
            div.dataset.pos = `${r}-${c}`; 
            div.dataset.letra = letra;
            div.dataset.emoji1 = emoji;
            
            div.onclick = () => {
                document.querySelectorAll('.celda').forEach(cel => cel.classList.remove('seleccionada'));
                div.classList.add('seleccionada');
                celdaEnFoco = div;
                let e = div.dataset.emoji1 + (div.dataset.emoji2 ? " y " + div.dataset.emoji2 : "");
                document.getElementById('pista-cr').innerHTML = `<span style="font-size:4rem">${e}</span> ¿Qué letra va aquí?`;
            };
            return div;
        }

        function verificarGanador() {
            const todas = document.querySelectorAll('.celda.activa');
            const acertadas = document.querySelectorAll('.celda.ok');
            if(todas.length === acertadas.length) {
                estrellas++;
                document.getElementById('stars-count').innerText = estrellas;
                if(window.añadirEstrellaAlCofre) añadirEstrellaAlCofre();
                document.getElementById('celebracion').style.display = 'flex';
                hablar("¡Fantástico!");
            }
        }

        function siguienteJuego() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('modo') === 'mezclado') {
                window.location.href = 'letras-mezclado.html';
            } else {
                nuevoReto();
            }
        }

        window.onload = () => {
            crearTeclado();
            nuevoReto();
        };
    </script>
</body>
</html>
