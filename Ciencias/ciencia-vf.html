<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verdadero o Falso 👍</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <script src="ciencia-datos.js"></script>
    <script src="../progreso.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { 
            margin: 0; font-family: 'Fredoka', sans-serif; text-align: center;
            background: #f1f8e9 url('../Recursos/Imagenes/fondo_ciencias.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.88); z-index: -1; }

        .header-juego { background: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #81c784; }
        .btn-volver { background: #546e7a; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0 #37474f; }
        
        .contenedor-blanco { max-width: 900px; margin: 20px auto; background: white; border-radius: 50px; padding: 30px; border: 8px solid #81c784; box-shadow: 0 15px 0 #c5e1a5; position: relative; }
        
        /* VISOR DE IMAGEN ROBUSTO */
        .img-pregunta { 
            width: 280px; height: 220px; 
            background: white; border-radius: 30px; border: 5px solid #eee; 
            display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 20px; overflow: hidden; position: relative;
        }

        .img-dibujo { 
            max-width: 90%; max-height: 90%; object-fit: contain; 
            z-index: 2; position: relative; display: none; 
            transition: opacity 0.3s;
        }

        .emoji-respaldo { 
            font-size: 10rem; position: absolute; z-index: 1; 
            transition: opacity 0.3s;
        }

        .vf-container { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .btn-vf { width: 220px; padding: 25px; border-radius: 35px; font-size: 1.8rem; font-weight: bold; border: none; cursor: pointer; color: white; transition: 0.2s; }
        .btn-verdadero { background: #4caf50; box-shadow: 0 8px 0 #2e7d32; }
        .btn-falso { background: #f44336; box-shadow: 0 8px 0 #b71c1c; }
        .btn-vf:active { transform: translateY(5px); box-shadow: none; }

        #celebracion { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="celebracion">
        <h1 id="emoji-ganar" style="font-size: 8rem; margin:0;">🌟</h1>
        <h1 style="font-size: 4rem; color: #2e7d32;">¡ACERTASTE!</h1>
        <button class="btn-vf" style="background:#4caf50; width:auto; padding:20px 60px;" onclick="nuevoReto()">Siguiente ⏭️</button>
    </div>

    <div class="header-juego">
        <a href="ciencias.html" class="btn-volver">⬅ MENÚ CIENCIAS</a>
        <h1 style="color: #2e7d32; font-size: 1.8rem; margin:0;">👍 Verdadero o Falso</h1>
        <h2 id="stars-count" style="font-size:2rem; margin:0; color:#2e7d32;">⭐ 0</h2>
    </div>

    <div class="contenedor-blanco">
        <div id="area-juego"></div>
    </div>

    <script>
        let estrellas = 0; let reto = {};
        function hablar(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }

        function nuevoReto() {
            document.getElementById('celebracion').style.display = 'none';
            const area = document.getElementById('area-juego');
            
            // En ciencias el banco de datos es BANCO_CIENCIAS
            const lista = BANCO_CIENCIAS["vf"];
            reto = lista[Math.floor(Math.random() * lista.length)];
            
            hablar(reto.p);

            // Estructura con respaldo de emoji
            area.innerHTML = `
                <div class="img-pregunta">
                    <div class="emoji-respaldo" id="emoji-bg">${reto.e}</div>
                    <img src="https://img.icons8.com/color/250/${reto.q}.png" 
                         class="img-dibujo" id="img-target"
                         onload="document.getElementById('emoji-bg').style.opacity='0.05'; this.style.display='block';"
                         onerror="this.style.display='none'; document.getElementById('emoji-bg').style.opacity='1';">
                </div>
                <h2 style="font-size: 2.5rem; color: #2e7d32; margin-top:0;">${reto.p}</h2>
                <div class="vf-container">
                    <button class="btn-vf btn-verdadero" onclick="checkVF(true)">✅ VERDAD</button>
                    <button class="btn-vf btn-falso" onclick="checkVF(false)">❌ MENTIRA</button>
                </div>`;
        }

        function checkVF(user) {
            if(user === reto.c) {
                estrellas++; 
                document.getElementById('stars-count').innerText = "⭐ " + estrellas;
                if(window.añadirEstrellaAlCofre) añadirEstrellaAlCofre(); 
                document.getElementById('emoji-ganar').innerText = reto.e;
                document.getElementById('celebracion').style.display = "flex";
                hablar("¡Muy bien!");
            } else { 
                hablar("¡No! Fíjate bien."); 
            }
        }
        window.onload = nuevoReto;
    </script>
</body>
</html>
