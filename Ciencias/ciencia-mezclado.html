<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sorteando Ciencia...</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <style>
        body { background: #f1f8e9; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .dado { font-size: 10rem; animation: girar 0.5s infinite; }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { color: #2e7d32; font-size: 3rem; }
    </style>
    <script>
        const juegos = ["ciencia-clasificar.html", "ciencia-relacionar.html", "ciencia-ordenar.html", "ciencia-vf.html", "ciencia-intruso.html"];
        window.onload = () => {
            const juego = juegos[Math.floor(Math.random() * juegos.length)];
            setTimeout(() => {
                window.location.href = `${juego}?modo=mezclado`;
            }, 1000);
        };
    </script>
</head>
<body>
    <div class="dado">🎲</div>
    <h1>Eligiendo un juego al azar...</h1>
</body>
</html>
