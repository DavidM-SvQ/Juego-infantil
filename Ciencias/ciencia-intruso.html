<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Intruso 🕵️‍♀️</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <link rel="stylesheet" href="../style.css">
    <script src="ciencia-datos.js"></script>
    <script src="../progreso.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { 
            margin: 0; font-family: 'Fredoka', sans-serif; text-align: center;
            background: #f1f8e9 url('../Recursos/Imagenes/fondo_ciencias.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.88); z-index: -1; }

        .header-juego { background: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #81c784; }
        .btn-volver { background: #546e7a; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0 #37474f; }
        
        .contenedor-blanco { max-width: 1000px; margin: 20px auto; background: white; border-radius: 50px; padding: 30px; border: 8px solid #81c784; box-shadow: 0 15px 0 #c5e1a5; min-height: 550px; position: relative; }

        .intruso-zona { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        
        .card-intruso { 
            width: 180px; height: 180px; background: white; border-radius: 35px; border: 6px solid #eee; 
            padding: 15px; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 0 #eee;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .card-intruso:hover { transform: scale(1.05); border-color: #81c784; }

        .img-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; z-index: 2; }
        .emoji-back { position: absolute; font-size: 5rem; opacity: 0.01; z-index: 1; }

        #celebracion { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .btn-verde { background: #4caf50; color: white; padding: 20px 60px; border-radius: 50px; border: none; font-size: 2rem; cursor: pointer; box-shadow: 0 8px 0 #1b5e20; font-weight: bold; }
    </style>
</head>
<body>
    <div id="celebracion">
        <h1 style="font-size: 8rem; margin:0;">🌟</h1>
        <h1 style="font-size: 4rem; color: #2e7d32;">¡BUEN OJO!</h1>
        <button class="btn-verde" onclick="nuevoReto()">Siguiente ⏭️</button>
    </div>

    <div class="header-juego">
        <a href="ciencias.html" class="btn btn-volver">⬅ MENÚ CIENCIAS</a>
		        <h1 style="color: #2e7d32; font-size: 1.8rem; margin:0;">🕵️‍♀️ El Intruso</h1>
        <h2 id="stars-count" style="font-size:2rem; margin:0; color:#2e7d32;">⭐ 0</h2>
    </div>

    <div class="contenedor-blanco">
        <h2 id="instruccion" style="font-size: 2.5rem; color: #2e7d32; margin-top:0;"></h2>
        <div id="area-juego"></div>
    </div>

    <script>
        let estrellas = 0; let reto = {};
        function hablar(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }
        function getImg(q) { return `https://img.icons8.com/color/200/${q}.png`; }

        function nuevoReto() {
            document.getElementById('celebracion').style.display = 'none';
            const area = document.getElementById('area-juego'); area.innerHTML = "";
            const lista = BANCO_CIENCIAS["intruso"];
            reto = lista[Math.floor(Math.random() * lista.length)];
            document.getElementById('instruccion').innerText = reto.p;
            hablar(reto.p);

            const zona = document.createElement('div'); zona.className = "intruso-zona";
            [...reto.items].sort(()=>Math.random()-0.5).forEach(it => {
                const d = document.createElement('div'); d.className = "card-intruso";
                d.innerHTML = `
                    <div class="img-container">
                        <span class="emoji-back">${it.e}</span>
                        <img src="${getImg(it.q)}" onerror="this.style.display='none'; this.parentNode.querySelector('.emoji-back').style.opacity='1';">
                    </div>`;
                d.onclick = () => {
                    if(it.i === true) ganar();
                    else { hablar("Ese no es"); d.style.opacity = "0.2"; d.style.pointerEvents = "none"; }
                };
                zona.appendChild(d);
            });
            area.appendChild(zona);
        }

        function ganar() {
            estrellas++; document.getElementById('stars-count').innerText = "⭐ " + estrellas;
            añadirEstrellaAlCofre();
            document.getElementById('celebracion').style.display = 'flex';
            hablar("¡Muy bien!");
        }
        window.onload = nuevoReto;
    </script>
</body>
</html>
