<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Asegúrate de que esta ruta al CSS sea correcta -->
    <link rel="stylesheet" href="../style.css">
    
    <style>
        /* Estilos específicos para que las tarjetas se vean bien sobre el fondo */
        body { margin: 0; font-family: 'Quicksand', sans-serif; text-align: center; }
        .header-juego { background: rgba(255,255,255,0.9); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #81c784; }
        
        .grid-ciencias { 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 20px; 
            padding: 30px 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        
        .subisla { 
            background: rgba(255, 255, 255, 0.9); /* Un poco de transparencia */
            backdrop-filter: blur(5px);
            border-radius: 30px; 
            padding: 20px; 
            width: 200px; 
            text-decoration: none; 
            color: #2e7d32; 
            border: 6px solid #81c784; 
            transition: 0.3s; 
            box-shadow: 0 10px 0 #c5e1a5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 180px;
        }
        
        .subisla:hover { transform: translateY(-8px); box-shadow: 0 18px 0 #c5e1a5; background: white; }
        .subisla span { font-size: 3.5rem; display: block; margin-bottom: 10px; }
        .subisla h2 { margin: 0; font-size: 1.4rem; }
        
        h1.titulo-principal { 
            font-size: 2.5rem; 
            color: #1b5e20; 
            margin-top: 30px; 
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8); /* Sombra blanca para que se lea sobre la foto */
        }
    </style>
</head>
