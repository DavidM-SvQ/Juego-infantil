<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Relacionar 🔗</title>
    <link rel="icon" type="image/png" href="../icono.png">
    <script src="ciencia-datos.js"></script>
    <script src="../progreso.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap');
        body { 
            margin: 0; font-family: 'Fredoka', sans-serif; text-align: center;
            background: #f1f8e9 url('../Recursos/Imagenes/fondo_ciencias.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.88); z-index: -1; }

        .header-juego { background: white; padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 6px solid #81c784; }
        .btn-volver { background: #546e7a; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 0 #37474f; }
        
        .contenedor-blanco { max-width: 1000px; margin: 20px auto; background: white; border-radius: 50px; padding: 30px; border: 8px solid #81c784; box-shadow: 0 15px 0 #c5e1a5; min-height: 550px; }

        .zona-superior { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px; min-height: 120px; }
        .item-clase { 
            width: 130px; padding: 10px; background: white; border-radius: 20px; border: 4px solid #eee; 
            cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; 
        }
        .item-clase.selected { border-color: #2196f3; transform: scale(1.1); box-shadow: 0 0 15px rgba(33, 150, 243, 0.3); }
        .img-icon { font-size: 3rem; margin-bottom: 5px; }

        .zona-inferior { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .categoria-destino { 
            width: 250px; min-height: 120px; background: white; border-radius: 35px; border: 6px solid #81c784; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; font-weight: bold; font-size: 1.4rem; color: #2e7d32;
        }

        .matched { animation: disappear 0.5s forwards; }
        @keyframes disappear { to { transform: scale(0); opacity: 0; } }

        #celebracion { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="celebracion">
        <h1 style="font-size: 8rem; margin:0;">🌟</h1>
        <h1 style="font-size: 4rem; color: #2e7d32;">¡BIEN AGRUPADO!</h1>
        <button class="btn-volver" style="background:#4caf50; padding:20px 60px; font-size:2rem; box-shadow:0 8px 0 #1b5e20;" onclick="nuevoReto()">Siguiente ⏭️</button>
    </div>

    <div class="header-juego">
        <a href="ciencias.html" class="btn-volver">⬅ MENÚ CIENCIAS</a>
        <h1 style="color: #2e7d32; font-size: 1.8rem; margin:0;">🔗 Relacionar</h1>
        <h2 id="stars-count" style="font-size:2rem; margin:0; color:#2e7d32;">⭐ 0</h2>
    </div>

    <div class="contenedor-blanco">
        <h2 id="instruccion" style="font-size: 2.2rem; color: #2e7d32; margin-top:0;"></h2>
        <div id="area-juego">
            <div id="grid-objetos" class="zona-superior"></div>
            <div id="grid-categorias" class="zona-inferior"></div>
        </div>
    </div>

    <script>
        let estrellas = 0; let aciertosActuales = 0; let totalObjetivo = 0; let seleccionado = null;
        function hablar(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'es-ES'; window.speechSynthesis.speak(m); }

        function nuevoReto() {
            document.getElementById('celebracion').style.display = 'none';
            const areaObjs = document.getElementById('grid-objetos');
            const areaCats = document.getElementById('grid-categorias');
            areaObjs.innerHTML = ""; areaCats.innerHTML = "";
            aciertosActuales = 0; seleccionado = null;

            const lista = BANCO_CIENCIAS["relacionar"];
            const reto = lista[Math.floor(Math.random() * lista.length)];
            document.getElementById('instruccion').innerText = reto.p;
            hablar(reto.p);
            totalObjetivo = reto.izq.length;

            reto.izq.sort(()=>Math.random()-0.5).forEach(it => {
                const d = document.createElement('div'); d.className = "item-clase";
                d.innerHTML = `<div class="img-icon">${it.e}</div><b>${it.n}</b>`;
                d.onclick = () => {
                    seleccionado = it;
                    document.querySelectorAll('.item-clase').forEach(x=>x.classList.remove('selected'));
                    d.classList.add('selected'); hablar(it.n);
                };
                areaObjs.appendChild(d);
            });

            reto.der.forEach(cat => {
                const d = document.createElement('div'); d.className = "categoria-destino";
                d.innerHTML = `<div class="img-icon">${cat.e}</div><b>${cat.n}</b>`;
                d.onclick = () => {
                    if(!seleccionado) { hablar("Toca primero un dibujo de arriba"); return; }
                    if(seleccionado.id === cat.id) {
                        hablar("¡Muy bien!");
                        const elSeleccionado = document.querySelector('.item-clase.selected');
                        elSeleccionado.classList.add('matched');
                        setTimeout(() => { elSeleccionado.style.visibility = "hidden"; }, 500);
                        seleccionado = null; aciertosActuales++;
                        if(aciertosActuales === totalObjetivo) ganar();
                    } else {
                        hablar("No, ese no es " + cat.n);
                        d.style.borderColor = "red"; setTimeout(()=> d.style.borderColor = "#81c784", 500);
                    }
                };
                areaCats.appendChild(d);
            });
        }

        function ganar() {
            estrellas++; document.getElementById('stars-count').innerText = "⭐ " + estrellas;
            añadirEstrellaAlCofre();
            document.getElementById('celebracion').style.display = "flex"; hablar("¡Genial!");
        }
        window.onload = nuevoReto;
    </script>
</body>
</html>
